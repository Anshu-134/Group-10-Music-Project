<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liked Songs — NicheTune</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">


<style>

:root{

--charcoal:#1c1a17;
--charcoal-2:#141210;
--cream:#efe6d2;
--cream-light:#f7f1e3;

--olive:#6b6f38;

--rust:#c1502e;

--text-muted:#948a68;
--text-dark:#211f1b;

}


*{
box-sizing:border-box;
margin:0;
padding:0;
}



body{

min-height:100vh;

background:
radial-gradient(circle at 20% 10%, rgba(107,111,56,.15), transparent 40%),
radial-gradient(circle at 80% 90%, rgba(193,80,46,.12), transparent 45%),
var(--charcoal);

color:var(--cream);

font-family:'Inter',sans-serif;

}



/* TOP BAR */


.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px clamp(20px,5vw,56px);

}



.brand{

font-family:'Fraunces',serif;

font-size:1.3rem;

color:var(--cream);

}



.top-actions{

display:flex;

gap:10px;

}



.nav-btn{

font-family:'Inter',sans-serif;

font-size:.78rem;

font-weight:600;

letter-spacing:.06em;

text-transform:uppercase;

color:var(--cream);

background:transparent;

border:1.5px solid rgba(239,230,210,.35);

border-radius:999px;

padding:10px 20px;

cursor:pointer;

transition:.2s;

}



.nav-btn:hover{

background:rgba(239,230,210,.1);

}




/* CONTENT */


main{

padding:30px clamp(20px,5vw,56px);

}



h1{

font-family:'Fraunces',serif;

font-size:2.2rem;

margin-bottom:8px;

}



.subtitle{

color:var(--text-muted);

margin-bottom:35px;

}




.song-container{

display:flex;

flex-direction:column;

gap:18px;

max-width:700px;

}




.song-card{

background:var(--cream);

color:var(--text-dark);

border-radius:20px;

padding:18px;

display:flex;

align-items:center;

gap:20px;

box-shadow:
0 20px 40px rgba(0,0,0,.35);

}



.song-card img{

width:75px;

height:75px;

border-radius:12px;

object-fit:cover;

background:#2a2723;

}



.song-info h2{

font-family:'Fraunces',serif;

font-size:1.2rem;

}



.song-info p{

color:#6b6455;

margin-top:5px;

}



.empty{

color:var(--text-muted);

margin-top:40px;

}



</style>


</head>



<body>


<div class="topbar">


<div class="brand">
NicheTune
</div>



<div class="top-actions">


<button class="nav-btn" id="profileBtn">
Profile
</button>


<button class="nav-btn" id="likedSongsBtn">
Liked Songs
</button>


<button class="nav-btn" id="logoutBtn">
Log out
</button>


</div>


</div>




<main>


<h1>
Liked Songs
</h1>


<p class="subtitle">
Your favorite tracks on NicheTune
</p>



<div class="song-container" id="songContainer">

</div>


<p class="empty" id="emptyMessage">
Loading liked songs...
</p>


</main>





<script>


const BASE_URL =
"https://group-10-backend.onrender.com";




// NAVIGATION


document
.getElementById("profileBtn")
.addEventListener("click",()=>{

window.location.href="profile.html";

});



document
.getElementById("likedSongsBtn")
.addEventListener("click",()=>{

window.location.href="liked.html";

});



document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{


await fetch(

`${BASE_URL}/logout`,

{

method:"POST",

credentials:"include"

}

);


window.location.href="login.html";


});






// LOAD LIKED SONGS


async function loadLikedSongs(){


try{


const response = await fetch(

`${BASE_URL}/history`,

{

method:"GET",

credentials:"include",

headers:{
"Accept":"application/json"
}

}

);



if(response.status===401){

window.location.href="login.html";

return;

}



const data = await response.json();


console.log("HISTORY:",data);



const likedSongs =
data.history.filter(
song => song.direction === "like"
);



const container =
document.getElementById("songContainer");


const empty =
document.getElementById("emptyMessage");



container.innerHTML="";



if(likedSongs.length===0){


empty.textContent =
"You haven't liked any songs yet.";


return;


}



empty.style.display="none";



likedSongs.forEach(song=>{


const card =
document.createElement("div");


card.className="song-card";



card.innerHTML=`

<img src="${song.artwork_url || ''}">


<div class="song-info">

<h2>${song.title}</h2>

<p>${song.artist}</p>

</div>

`;



container.appendChild(card);



});



}



catch(error){


console.error(
"LIKED SONG ERROR:",
error
);



document.getElementById("emptyMessage")
.textContent =
"Could not load liked songs.";


}


}



loadLikedSongs();


</script>



</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liked Songs — Sindr</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

--charcoal:#1c1a17;
--charcoal-2:#141210;
--charcoal-soft:#2a2723;

--cream:#efe6d2;
--cream-light:#f7f1e3;

--rust:#c1502e;
--olive:#6b6f38;

--text-muted:#948a68;

}



*{
box-sizing:border-box;
margin:0;
padding:0;
}



body{

min-height:100vh;

background:

radial-gradient(circle at 15% 10%, rgba(107,111,56,.16),transparent 45%),

radial-gradient(circle at 85% 90%, rgba(193,80,46,.14),transparent 50%),

var(--charcoal);

color:var(--cream);

font-family:'Inter',sans-serif;

}



/* NAV */


.topbar{

display:flex;

align-items:center;

justify-content:space-between;

padding:22px clamp(20px,5vw,56px);

}



.brand{

font-family:'Fraunces',serif;

font-size:1.2rem;

font-weight:600;

}



.top-actions{

display:flex;

gap:10px;

}



.nav-btn{

background:transparent;

color:var(--cream);

border:

1.5px solid rgba(239,230,210,.35);

border-radius:999px;

padding:10px 20px;

font-size:.75rem;

font-weight:600;

letter-spacing:.06em;

text-transform:uppercase;

cursor:pointer;

transition:.25s;

}



.nav-btn:hover{

background:rgba(239,230,210,.08);

}



/* MAIN */


main{

display:flex;

justify-content:center;

padding:45px 20px;

}



.wrapper{

width:620px;

max-width:95vw;

}



/* HEADER */


.header{

text-align:center;

margin-bottom:45px;

}



.vinyl{

width:85px;

height:85px;

margin:0 auto 25px;

border-radius:50%;

background:

repeating-conic-gradient(

#141210 0deg 5deg,

#2a2723 5deg 10deg

);


display:flex;

align-items:center;

justify-content:center;


box-shadow:

0 20px 45px rgba(0,0,0,.5);


animation:spin 10s linear infinite;

}



.vinyl::after{

content:"";

width:28px;

height:28px;

border-radius:50%;

background:var(--olive);

box-shadow:

inset 0 0 0 5px #141210;

}



@keyframes spin{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}



h1{

font-family:'Fraunces',serif;

font-size:2.6rem;

margin-bottom:10px;

}



.subtitle{

color:var(--text-muted);

font-size:.95rem;

}





/* SONG CARDS */


.song-list{

display:flex;

flex-direction:column;

gap:14px;

}



.song-card{


display:flex;

align-items:center;

gap:18px;


padding:18px 22px;


background:

rgba(239,230,210,.08);


border:

1px solid rgba(239,230,210,.12);


border-radius:24px;


backdrop-filter:blur(10px);


transition:.25s;

}



.song-card:hover{

transform:translateY(-4px);

background:

rgba(239,230,210,.14);

}





.number{


width:38px;

height:38px;


border-radius:50%;


background:

linear-gradient(
135deg,
var(--rust),
#9c3d22
);


display:flex;

align-items:center;

justify-content:center;


font-size:.8rem;

font-weight:700;


color:var(--cream-light);

flex-shrink:0;

}



.song-info{

flex:1;

}



.song-title{

font-family:'Fraunces',serif;

font-size:1.15rem;

color:var(--cream);

}



.artist{

margin-top:5px;

font-size:.88rem;

color:var(--text-muted);

}



.heart{

font-size:1.1rem;

color:var(--rust);

}





.empty{

text-align:center;

padding:40px;

color:var(--text-muted);

}@media(max-width:600px){


.top-actions{

gap:5px;

}


.nav-btn{

padding:9px 12px;

font-size:.65rem;

}


h1{

font-size:2.1rem;

}


}



</style>


</head>


<body>



<div class="topbar">


<div class="brand">
Sindr
</div>


<div class="top-actions">


<button class="nav-btn" id="profileBtn">
Profile
</button>


<button class="nav-btn" id="likedBtn">
Liked Songs
</button>


<button class="nav-btn" id="logoutBtn">
Log out
</button>


</div>


</div>





<main>


<div class="wrapper">


<div class="header">


<div class="vinyl"></div>


<h1>
Liked Songs
</h1>


<p class="subtitle">
Your favorite tracks on Sindr
</p>


</div>




<div class="song-list" id="songList">


<div class="empty">
Loading songs...
</div>


</div>



</div>


</main><script>


const BASE_URL =
"https://group-10-backend.onrender.com";



async function checkLogin(){

    try{

        const response = await fetch(
            `${BASE_URL}/profile`,
            {
                method:"GET",
                credentials:"include"
            }
        );


        if(response.status === 401){

            window.location.replace("login.html");

        }

    }
    catch(error){

        window.location.replace("login.html");

    }

}




document.getElementById("profileBtn").onclick=()=>{

window.location.href="profile.html";

};



document.getElementById("likedBtn").onclick=()=>{

window.location.href="liked.html";

};



document.getElementById("logoutBtn").onclick=async()=>{


await fetch(

`${BASE_URL}/logout`,

{

method:"POST",

credentials:"include"

}

);


window.location.replace("login.html");

};






async function loadLikedSongs(){


try{


const response =
await fetch(

`${BASE_URL}/history`,

{

credentials:"include"

}

);



if(response.status === 401){

    window.location.replace("login.html");
    return;

}



const data =
await response.json();



const songs =
data.history.filter(
song=>song.direction==="like"
);



const list =
document.getElementById("songList");



list.innerHTML="";



if(songs.length===0){

list.innerHTML=`

<div class="empty">
No liked songs yet.
Start discovering music!
</div>

`;

return;

}



songs.forEach((song,index)=>{


const card =
document.createElement("div");


card.className="song-card";



card.innerHTML=`

<div class="number">
${index+1}
</div>


<div class="song-info">

<div class="song-title">
${song.title}
</div>


<div class="artist">
${song.artist}
</div>

</div>


<div class="heart">
♥
</div>

`;



list.appendChild(card);


});


}


catch(error){

console.error(error);


document.getElementById("songList").innerHTML=`

<div class="empty">
Could not load liked songs.
</div>

`;

}


}checkLogin();

loadLikedSongs();



</script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discover — Find Your Next Favorite Track</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

--charcoal:#1c1a17;
--charcoal-2:#141210;
--charcoal-soft:#2a2723;

--cream:#efe6d2;
--cream-light:#f7f1e3;

--rust:#c1502e;
--rust-dark:#9c3d22;

--olive:#6b6f38;
--olive-dark:#565933;

--text-cream:#f2e2b8;
--text-dark:#211f1b;
--text-muted:#948a68;
--text-body:#6b6455;

--radius-lg:28px;
--radius-md:16px;

--shadow-card:
0 30px 60px -20px rgba(0,0,0,.55),
0 10px 20px -10px rgba(0,0,0,.35);

}


*{
box-sizing:border-box;
margin:0;
padding:0;
}


html,body{
height:100%;
}


body{

background:
radial-gradient(circle at 15% 10%,rgba(107,111,56,.15),transparent 45%),
radial-gradient(circle at 85% 90%,rgba(193,80,46,.12),transparent 50%),
var(--charcoal);

color:var(--cream);

font-family:'Inter',sans-serif;

min-height:100vh;

display:flex;
flex-direction:column;

overflow-x:hidden;

}



/* TOP BAR */

.topbar{

display:flex;
align-items:center;
justify-content:space-between;

padding:22px clamp(20px,5vw,56px);

}



.brand{

display:flex;
align-items:center;
gap:12px;

}



.brand-mark{

width:34px;
height:34px;

border-radius:50%;

background:
repeating-conic-gradient(
var(--charcoal-2) 0deg 6deg,
var(--charcoal-soft) 6deg 12deg
);

display:flex;
align-items:center;
justify-content:center;

}


.brand-mark::after{

content:"";

width:12px;
height:12px;

border-radius:50%;

background:var(--olive);

box-shadow:
inset 0 0 0 3px var(--charcoal-2);

}



.brand-name{

font-family:'Fraunces',serif;

font-size:1.15rem;

font-weight:600;

color:var(--text-cream);

}



/* BUTTONS */


.top-actions{

display:flex;
gap:8px;
align-items:center;

}


.profile-btn,
.liked-btn,
.logout-btn{


font-family:'Inter',sans-serif;

font-size:.78rem;

font-weight:600;

letter-spacing:.06em;

text-transform:uppercase;

color:var(--text-cream);

background:transparent;

border:

1.5px solid rgba(242,226,184,.35);

border-radius:999px;

padding:10px 20px;

cursor:pointer;

transition:.2s;

}


.profile-btn:hover,
.liked-btn:hover,
.logout-btn:hover{

background:rgba(242,226,184,.08);

border-color:rgba(242,226,184,.6);

}



/* MAIN */


main{

flex:1;

display:flex;

flex-direction:column;

align-items:center;

padding:10px 20px 40px;

}



.tagline{

color:var(--text-muted);

font-size:.85rem;

letter-spacing:.04em;

margin-bottom:26px;

text-align:center;

}



/* CARD */


.stack{

position:relative;

width:100%;

max-width:380px;

height:min(600px,72vh);

}



.card{

position:absolute;

inset:0;

background:var(--cream);

border-radius:var(--radius-lg);

box-shadow:var(--shadow-card);

display:flex;

flex-direction:column;

overflow:visible;

color:var(--text-dark);

}



.card.behind-1{

transform:
scale(.96)
translateY(14px);

opacity:.75;

z-index:1;

}


.card.behind-2{

transform:
scale(.92)
translateY(26px);

opacity:.45;

z-index:0;

}



/* FIXED SWIPE */

.card.active{

z-index:2;

cursor:grab;

touch-action:none;

transition:
transform .35s cubic-bezier(.2,.7,.3,1),
opacity .35s ease;

}


.card.active.dragging{

transition:none;

}



.card.fly-left{

transform:
translate(-140%,-10%)
rotate(-18deg)!important;

opacity:0;

}



.card.fly-right{

transform:
translate(140%,-10%)
rotate(18deg)!important;

opacity:0;

}



/* ART */


.art-wrap{

position:relative;

width:100%;

aspect-ratio:1/1;

background:
linear-gradient(
160deg,
var(--charcoal-soft),
var(--charcoal-2)
);

overflow:hidden;

flex-shrink:0;

}


.art-image{

position:absolute;

inset:0;

background-size:cover;

background-position:center;

}



/* TRACK INFO */


.track-info{

padding:20px 22px 8px;

}


.song-title{

font-family:'Fraunces',serif;

font-size:1.5rem;

margin-bottom:4px;

}


.artist-name{

font-size:.98rem;

color:var(--text-body);

}



/* PLAYER */


.player-wrap{

padding:14px 22px 0;

}


#soundcloud-embed{

width:100%;

height:88px;

border:none;

border-radius:var(--radius-md);

}



/* GENRE */


.genre-pill{

position:absolute;

top:16px;

left:16px;

background:rgba(28,26,23,.65);

color:var(--text-cream);

padding:7px 14px;

border-radius:999px;

font-size:.7rem;

z-index:3;

}



/* VINYL */


.vinyl{

position:absolute;

bottom:-34px;

right:-34px;

width:130px;

height:130px;

border-radius:50%;

background:
repeating-conic-gradient(
var(--charcoal-2) 0deg 4deg,
#262320 4deg 8deg
);

animation:spin 6s linear infinite;

}


@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}


.vinyl::after{

content:"";

position:absolute;

width:44px;

height:44px;

border-radius:50%;

background:var(--olive);

left:43px;

top:43px;

}



/* ACTIONS */


.actions{

position:absolute;

left:-90px;

right:-90px;

top:0;

bottom:0;

z-index:10;

pointer-events:none;

}



.action-btn{

width:56px;

height:56px;

border-radius:50%;

border:none;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

}



.action-btn svg{

width:26px;

height:26px;

}



.like-btn{

position:absolute;

right:0;

top:50%;

transform:translateY(-50%);

pointer-events:auto;

background:var(--olive);

}



.dislike-btn{

position:absolute;

left:0;

top:50%;

transform:translateY(-50%);

pointer-events:auto;

background:var(--rust);

}



.undo-btn{

position:absolute;

bottom:-80px;

left:50%;

transform:translateX(-50%);

pointer-events:auto;

background:var(--cream-light);

}



/* EMPTY */


.empty-state{

display:none;

}



</style>
</head>

<body>


<div class="topbar">

    <div class="brand">

        <div class="brand-mark"></div>

        <span class="brand-name">
            Sindr
        </span>

    </div>



    <div class="top-actions">


        <button class="profile-btn" id="profileBtn">
            Profile
        </button>


        <button class="liked-btn" id="likedSongsBtn">
            Liked Songs
        </button>


        <button class="logout-btn" id="logoutBtn">
            Log out
        </button>


    </div>

</div>




<main>


<p class="tagline">
Swipe right to like, left to pass
</p>



<div class="stack" id="cardStack">


    <!-- BACK CARDS -->

    <div class="card behind-2"></div>

    <div class="card behind-1"></div>



    <!-- ACTIVE CARD -->


    <div class="card active" id="activeCard">


        <div class="art-wrap">


            <div 
            class="art-image" 
            id="artImage">
            </div>


            <span 
            class="genre-pill" 
            id="genreLabel">
                Genre
            </span>


            <div class="vinyl"></div>


        </div>





        <div class="track-info">


            <h2 
            class="song-title" 
            id="songTitle">

                Song title

            </h2>



            <p 
            class="artist-name" 
            id="artistName">

                Artist name

            </p>



        </div>





        <div class="player-wrap">


            <iframe

            id="soundcloud-embed"

            scrolling="no"

            frameborder="no"

            allow="autoplay">

            </iframe>



        </div>







        <div class="actions">



            <button 
            class="action-btn undo-btn" 
            id="undoBtn">


                <svg 
                viewBox="0 0 24 24"
                fill="none"
                stroke="black"
                stroke-width="2">


                <path d="M3 10h9a5 5 0 0 1 0 10H7"/>

                <path d="M7 5 3 10l4 5"/>


                </svg>



            </button>







            <button 
            class="action-btn dislike-btn" 
            id="dislikeBtn">


                <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2.5">


                <path d="M6 6l12 12"/>

                <path d="M18 6L6 18"/>


                </svg>


            </button>








            <button 
            class="action-btn like-btn" 
            id="likeBtn">


                <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2.2">


                <path d="
                M12.1 20.3
                s-7.1-4.4-9.6-9
                A5.4 5.4 0 0 1
                12 5.5
                a5.4 5.4 0 0 1
                9.5 5.8
                c-2.5 4.6-9.4 9-9.4 9z"/>


                </svg>



            </button>



        </div>




    </div>








    <!-- EMPTY STATE -->


    <div 
    class="empty-state" 
    id="emptyState">


        <h2>
        You're all caught up
        </h2>



        <p>
        We're queuing more tracks based on what you liked.
        </p>


        <button id="refreshBtn">

            Refresh

        </button>



    </div>



</div>



</main>
<script>

const BASE_URL = "https://group-10-backend.onrender.com";


async function checkLogin(){

    try{

        const response = await fetch(
            `${BASE_URL}/profile`,
            {
                method:"GET",
                credentials:"include"
            }
        );


        if(response.status === 401){

            window.location.replace("login.html");

        }


    }catch(error){

        window.location.replace("login.html");

    }

}


checkLogin();



let currentSong = null;



async function sendSwipe(direction){


    if(!currentSong){

        console.log("No current song");

        return;

    }



    try{


        const response = await fetch(

            `${BASE_URL}/swipe`,

            {

                method:"POST",

                credentials:"include",

                headers:{

                    "Content-Type":"application/json"

                },


                body:JSON.stringify({

                    song_id:currentSong.id,

                    direction:direction

                })


            }

        );



        const data = await response.json();


        console.log("Swipe response:",data);



        setTimeout(()=>{

            loadSong();

        },300);



    }

    catch(error){

        console.error(
            "SWIPE ERROR:",
            error
        );

    }


}






/* BUTTONS */


document
.getElementById("likeBtn")
.addEventListener(
"click",
()=>{

sendSwipe("like");

}
);



document
.getElementById("dislikeBtn")
.addEventListener(
"click",
()=>{

sendSwipe("dislike");

}
);







/* CARD SWIPE */


const card =
document.getElementById("activeCard");



let startX = 0;

let currentX = 0;

let dragging = false;





card.addEventListener(
"mousedown",
startDrag
);


document.addEventListener(
"mousemove",
drag
);


document.addEventListener(
"mouseup",
endDrag
);




card.addEventListener(
"touchstart",
startDrag,
{
passive:false
}
);



document.addEventListener(
"touchmove",
drag,
{
passive:false
}
);



document.addEventListener(
"touchend",
endDrag
);







function startDrag(e){



    if(e.target.closest("button")){

        return;

    }



    dragging = true;



    startX =
    e.type.includes("touch")
    ?
    e.touches[0].clientX
    :
    e.clientX;



    currentX = startX;



    card.classList.add(
    "dragging"
    );


}






function drag(e){



    if(!dragging){

        return;

    }



    e.preventDefault();



    currentX =
    e.type.includes("touch")
    ?
    e.touches[0].clientX
    :
    e.clientX;



    let distance =
    currentX-startX;




    card.style.transform =

    `
    translateX(${distance}px)
    rotate(${distance*0.05}deg)
    `;


}








async function endDrag(){



    if(!dragging){

        return;

    }



    dragging=false;



    card.classList.remove(
    "dragging"
    );



    let distance =
    currentX-startX;




    if(distance > 100){



        card.classList.add(
        "fly-right"
        );



        await sendSwipe(
        "like"
        );



        resetCard();



    }



    else if(distance < -100){



        card.classList.add(
        "fly-left"
        );



        await sendSwipe(
        "dislike"
        );



        resetCard();



    }



    else{


        card.style.transform="";


    }



}






function resetCard(){


    card.classList.remove(
    "fly-right"
    );


    card.classList.remove(
    "fly-left"
    );


    card.style.transform="";


}








/* UNDO BUTTON */


document
.getElementById("undoBtn")
.addEventListener(
"click",
()=>{


    card.classList.remove(
    "fly-left"
    );


    card.classList.remove(
    "fly-right"
    );


    card.style.transform="";


}

);







/* LOGOUT */


document
.getElementById("logoutBtn")
.addEventListener(
"click",
async()=>{


await fetch(

`${BASE_URL}/logout`,

{

method:"POST",

credentials:"include"

}

);



window.location.replace(
"login.html"
);



}

);








/* NAVIGATION */


document
.getElementById("likedSongsBtn")
.addEventListener(
"click",
()=>{


window.location.href =
"liked.html";


}

);




document
.getElementById("profileBtn")
.addEventListener(
"click",
()=>{


window.location.href =
"profile.html";


}

);









/* LOAD SONG */


async function loadSong(){



try{


console.log(
"Loading song..."
);




const response =
await fetch(

`${BASE_URL}/recommend`,

{

method:"GET",

credentials:"include",

headers:{

"Accept":"application/json"

}

}

);





const data =
await response.json();



console.log(
"Backend response:",
data
);






if(!data.song){

console.log(
"No song returned"
);

return;

}





currentSong =
data.song;






document
.getElementById("songTitle")
.textContent =
currentSong.title ||
"Unknown Title";




document
.getElementById("artistName")
.textContent =
currentSong.artist ||
"Unknown Artist";




document
.getElementById("genreLabel")
.textContent =
currentSong.genre ||
"Unknown";







if(currentSong.artwork_url){


document
.getElementById("artImage")
.style.backgroundImage =

`url("${currentSong.artwork_url}")`;


}







document
.getElementById("soundcloud-embed")
.src =

`https://w.soundcloud.com/player/?url=${encodeURIComponent(currentSong.permalink_url)}`;






console.log(
"Loaded:",
currentSong
);




}

catch(error){


console.error(
"LOAD SONG ERROR:",
error
);


}


}






loadSong();


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile — NicheTune</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

--charcoal:#1c1a17;
--charcoal-2:#141210;
--charcoal-soft:#2a2723;

--cream:#efe6d2;
--cream-light:#f7f1e3;

--rust:#c1502e;
--rust-dark:#9c3d22;

--olive:#6b6f38;
--olive-dark:#565933;

--text-cream:#f2e2b8;
--text-dark:#211f1b;
--text-muted:#948a68;

}


*{
box-sizing:border-box;
margin:0;
padding:0;
}


html,body{

height:100%;

}



body{

min-height:100vh;

background:

radial-gradient(circle at 15% 10%, rgba(107,111,56,.15), transparent 45%),

radial-gradient(circle at 85% 90%, rgba(193,80,46,.12), transparent 50%),

var(--charcoal);


color:var(--cream);

font-family:'Inter',sans-serif;

display:flex;

flex-direction:column;

}



/* ---------- TOP BAR ---------- */


.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px clamp(20px,5vw,56px);

}



.brand{

display:flex;

align-items:center;

gap:12px;

}



.brand-mark{

width:34px;

height:34px;

border-radius:50%;


background:

repeating-conic-gradient(
var(--charcoal-2) 0deg 6deg,
var(--charcoal-soft) 6deg 12deg
);


display:flex;

align-items:center;

justify-content:center;

}



.brand-mark::after{

content:"";

width:12px;

height:12px;

border-radius:50%;


background:var(--olive);

box-shadow:

inset 0 0 0 3px var(--charcoal-2);

}



.brand-name{

font-family:'Fraunces',serif;

font-size:1.15rem;

font-weight:600;

color:var(--text-cream);

}



.top-actions{

display:flex;

gap:12px;

}



.profile-btn,
.logout-btn{


font-family:'Inter',sans-serif;

font-size:.78rem;

font-weight:600;

letter-spacing:.06em;

text-transform:uppercase;

color:var(--text-cream);

background:transparent;

border:1.5px solid rgba(242,226,184,.35);

border-radius:999px;

padding:10px 20px;

cursor:pointer;

transition:.2s;

}



.profile-btn:hover,
.logout-btn:hover{

background:rgba(242,226,184,.08);

}



/* ---------- CENTER CONTENT ---------- */


main{


flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



/* ---------- PROFILE CARD ---------- */


.profile-card{


width:440px;

max-width:90vw;

background:var(--cream);

color:var(--text-dark);

border-radius:28px;

padding:40px;


box-shadow:

0 30px 60px -20px rgba(0,0,0,.55),

0 10px 20px -10px rgba(0,0,0,.35);

}



.profile-title{


font-family:'Fraunces',serif;

font-size:2.2rem;

margin-bottom:8px;

}



.profile-sub{


font-size:.9rem;

color:var(--text-muted);

margin-bottom:35px;

}



.avatar{


width:100px;

height:100px;

border-radius:50%;


background:var(--olive);


display:flex;

align-items:center;

justify-content:center;


font-size:45px;


margin-bottom:35px;

}



/* INFO */


.info-card{


background:white;

border-radius:16px;

padding:18px;

margin-bottom:16px;


border:1px solid rgba(193,80,46,.3);

}



.label{


font-size:.7rem;

font-weight:600;

letter-spacing:.08em;

text-transform:uppercase;

color:var(--rust);

}



.value{


font-family:'Fraunces',serif;

font-size:1.3rem;

margin-top:6px;

}



/* BUTTON */


.back-btn{


width:100%;

margin-top:18px;

padding:14px;


border:none;

border-radius:999px;


background:var(--rust);

color:var(--cream-light);


font-weight:600;

cursor:pointer;

font-size:.9rem;

}



.back-btn:hover{

background:var(--rust-dark);

}



@media(max-width:480px){

.profile-card{

padding:28px;

}

}


</style>


</head>



<body>



<div class="topbar">


<div class="brand">

<div class="brand-mark"></div>

<span class="brand-name">
TBD
</span>

</div>



<div class="top-actions">


<button class="profile-btn">
Profile
</button>


<button class="logout-btn" id="logoutBtn">
Log out
</button>


</div>


</div>





<main>


<div class="profile-card">


<h1 class="profile-title">
Your Profile
</h1>


<p class="profile-sub">
Your NicheTune music identity
</p>




<div class="avatar">
🎵
</div>




<div class="info-card">

<div class="label">
Username
</div>

<div class="value" id="username">
Loading...
</div>

</div>




<div class="info-card">

<div class="label">
Favorite Genre
</div>

<div class="value" id="genre">
Loading...
</div>

</div>




<div class="info-card">

<div class="label">
Liked Songs
</div>

<div class="value" id="likes">
Loading...
</div>

</div>




<div class="info-card">

<div class="label">
Member Since
</div>

<div class="value" id="joined">
Loading...
</div>

</div>




<button class="back-btn" onclick="window.location.href='home.html'">

Back to Discover

</button>



</div>


</main>





<script>


const BASE_URL =
"https://group-10-backend.onrender.com";



// LOAD PROFILE FROM API


async function loadProfile(){


try{


const response = await fetch(

`${BASE_URL}/profile`,

{

method:"GET",

credentials:"include"

}

);



if(response.status===401){

window.location.href="login.html";

return;

}



const data = await response.json();


console.log("PROFILE:",data);



document.getElementById("username").textContent =
data.username;



document.getElementById("genre").textContent =
data.favorite_genre || "Not available";



document.getElementById("likes").textContent =
`${data.liked_count} songs`;



document.getElementById("joined").textContent =
new Date(data.joined_at)
.toLocaleDateString();



}


catch(error){

console.error(
"PROFILE ERROR:",
error
);

}


}




// LOGOUT


document
.getElementById("logoutBtn")
.addEventListener(
"click",
async()=>{


await fetch(

`${BASE_URL}/logout`,

{

method:"POST",

credentials:"include"

}

);



window.location.href="login.html";


});




loadProfile();



</script>



</body>

</html>

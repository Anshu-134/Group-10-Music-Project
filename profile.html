<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile — NicheTune</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

--charcoal:#1c1a17;
--charcoal-2:#141210;
--charcoal-soft:#2a2723;

--cream:#efe6d2;
--cream-light:#f7f1e3;

--rust:#c1502e;
--rust-dark:#9c3d22;

--olive:#6b6f38;

--text-dark:#211f1b;
--text-cream:#f2e2b8;
--text-muted:#948a68;

}



*{
box-sizing:border-box;
margin:0;
padding:0;
}



body{

min-height:100vh;

background:

radial-gradient(circle at 15% 10%, rgba(107,111,56,.15), transparent 45%),

radial-gradient(circle at 85% 90%, rgba(193,80,46,.12), transparent 50%),

var(--charcoal);


font-family:'Inter',sans-serif;

color:var(--cream);

display:flex;

flex-direction:column;

}



/* TOP NAV */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px clamp(20px,5vw,56px);

}



.brand{

display:flex;

align-items:center;

gap:12px;

}



.brand-mark{

width:34px;
height:34px;

border-radius:50%;


background:

repeating-conic-gradient(
var(--charcoal-2) 0deg 6deg,
var(--charcoal-soft) 6deg 12deg
);


display:flex;

align-items:center;

justify-content:center;

}



.brand-mark::after{

content:"";

width:12px;
height:12px;

border-radius:50%;

background:var(--olive);

box-shadow:
inset 0 0 0 3px var(--charcoal-2);

}



.brand-name{

font-family:'Fraunces',serif;

font-size:1.15rem;

color:var(--text-cream);

}



.top-actions{

display:flex;

gap:12px;

}



.nav-btn{

background:transparent;

color:var(--text-cream);

border:1.5px solid rgba(242,226,184,.35);

border-radius:999px;

padding:10px 18px;

font-size:.75rem;

font-weight:600;

letter-spacing:.06em;

text-transform:uppercase;

cursor:pointer;

}



.nav-btn:hover{

background:rgba(242,226,184,.08);

}



/* MAIN */


main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



/* PROFILE CARD */


.profile-card{

width:420px;

max-width:92vw;

background:var(--cream);

color:var(--text-dark);

border-radius:30px;

padding:35px;


box-shadow:

0 30px 60px -20px rgba(0,0,0,.6);

text-align:center;

}



/* AVATAR */


.avatar{

width:95px;

height:95px;

border-radius:50%;

background:

linear-gradient(
135deg,
var(--olive),
#8b8f48
);


display:flex;

align-items:center;

justify-content:center;


font-size:42px;

margin:0 auto 18px;

}



.username{

font-family:'Fraunces',serif;

font-size:2rem;

}



.subtitle{

font-size:.85rem;

color:var(--text-muted);

margin-top:6px;

}



/* STATS */


.stats{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

margin:30px 0;

}



.stat{

background:white;

border-radius:18px;

padding:15px 8px;

}



.stat-number{

font-family:'Fraunces',serif;

font-size:1.3rem;

}



.stat-label{

font-size:.65rem;

color:var(--text-muted);

text-transform:uppercase;

letter-spacing:.08em;

margin-top:5px;

}



/* SOUND */


.section-title{

font-family:'Fraunces',serif;

font-size:1.2rem;

text-align:left;

margin-bottom:12px;

}



.genre-container{

display:flex;

justify-content:flex-start;

gap:8px;

margin-bottom:22px;

}



.genre-pill{

background:rgba(107,111,56,.15);

color:var(--olive);

padding:8px 16px;

border-radius:999px;

font-size:.8rem;

font-weight:600;

}



.member{

background:white;

border-radius:16px;

padding:14px;

text-align:left;

margin-bottom:20px;

}



.member-label{

font-size:.65rem;

text-transform:uppercase;

letter-spacing:.08em;

color:var(--text-muted);

}



.member-value{

font-family:'Fraunces',serif;

font-size:1.1rem;

margin-top:5px;

}



/* BACK BUTTON */


.back-btn{

width:100%;

padding:13px;

border:none;

border-radius:999px;

background:var(--rust);

color:white;

font-weight:600;

cursor:pointer;

}



.back-btn:hover{

background:var(--rust-dark);

}



</style>

</head>

<body>



<div class="topbar">


<div class="brand">

<div class="brand-mark"></div>

<span class="brand-name">
TBD
</span>

</div>



<div class="top-actions">


<button class="nav-btn" onclick="location.href='liked.html'">
Liked Songs
</button>


<button class="nav-btn" id="logoutBtn">
Log out
</button>


</div>


</div>





<main>


<div class="profile-card">


<div class="avatar">

<span>
♪ 
</span>

</div>



<h1 class="profile-title">
Your Profile
</h1>


<p class="profile-sub">
Your NicheTune music identity
</p>



<div class="username" id="username">
Loading...
</div>



<div class="stats">


<div class="stat">

<strong id="likes">
0
</strong>

<span>
Liked
</span>

</div>



<div class="stat">

<strong id="genre">
-
</strong>

<span>
Genre
</span>

</div>



<div class="stat">

<strong id="joined">
-
</strong>

<span>
Joined
</span>

</div>


</div>



<button class="back-btn" onclick="location.href='home.html'">

Back to Discover

</button>



</div>


</main>





<script>


const BASE_URL =
"https://group-10-backend.onrender.com";



async function loadProfile(){


try{


const response = await fetch(

`${BASE_URL}/profile`,

{

credentials:"include"

}

);



if(response.status===401){

location.href="login.html";

return;

}



const data = await response.json();



document.getElementById("username").textContent =
data.username || "Listener";


document.getElementById("likes").textContent =
data.liked_count || 0;


document.getElementById("genre").textContent =
data.favorite_genre || "-";


document.getElementById("joined").textContent =
new Date(data.joined_at)
.toLocaleDateString("en-US",
{
month:"short",
year:"numeric"
}
);



}


catch(error){

console.log(error);

}



}





document.getElementById("logoutBtn")
.addEventListener("click", async()=>{


await fetch(

`${BASE_URL}/logout`,

{

method:"POST",

credentials:"include"

}

);


location.href="login.html";


});



loadProfile();


</script>


</body>
